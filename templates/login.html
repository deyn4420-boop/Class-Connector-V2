{% extends "base.html" %}
{% block title %}Login — ClassConnect{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto">
  <h1 class="page-title">Welcome Back</h1>
  <p class="page-sub">New here? <a href="/register" style="color:var(--primary)">Create an account</a></p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Login ID</label>
        <input type="text" name="login_id" placeholder="USN / Staff ID / Email" required autofocus style="letter-spacing:1px">
        <small style="color:var(--muted);font-size:.78rem;margin-top:.3rem;display:block">
          Students: use your <strong style="color:var(--text)">USN</strong> &nbsp;|&nbsp;
          Teachers: use your <strong style="color:var(--text)">Staff ID</strong> or email
        </small>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">Log In →</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:.85rem">
    Forgot your USN? Contact your teacher.
  </div>
</div>
{% endblock %}
